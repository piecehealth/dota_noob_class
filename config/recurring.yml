#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Batch sync player matches and ranks twice daily (4am and 4pm)
  # Uses GraphQL batch queries (~10 players per request)
  sync_players_morning:
    class: BatchSyncAllPlayersJob
    schedule: at 4am every day

  sync_players_evening:
    class: BatchSyncAllPlayersJob
    schedule: at 4pm every day

  # Calculate daily stats after morning sync
  calculate_daily_stats:
    class: CalculateDailyStatsJob
    schedule: at 5am every day

  # Calculate weekly stats every Monday at 3am
  calculate_weekly_stats:
    class: CalculateWeeklyStatsJob
    schedule: at 3am every Monday
